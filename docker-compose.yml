services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
    volumes:
      - audio_data:/data
    depends_on:
      redis:
        condition: service_healthy

  song-fetcher:
    build:
      context: .
      dockerfile: workers/fetcher/Dockerfile
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
    volumes:
      - audio_data:/data
    depends_on:
      redis:
        condition: service_healthy

  song-analyzer:
    build:
      context: .
      dockerfile: workers/analyzer/Dockerfile
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
      TORCH_HOME: /model_cache
      PYTHONPATH: /app:/app/workers/analyzer
    volumes:
      - audio_data:/data
      - model_cache:/model_cache
    depends_on:
      redis:
        condition: service_healthy

  song-transcriber:
    build:
      context: .
      dockerfile: workers/transcriber/Dockerfile
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app:/app/workers/transcriber
    volumes:
      - audio_data:/data
      - model_cache:/model_cache
    depends_on:
      redis:
        condition: service_healthy

  song-transcriber-cuda:
    build:
      context: .
      dockerfile: workers/transcriber-cuda/Dockerfile
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
    volumes:
      - audio_data:/data
      - model_cache:/model_cache
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  audio_data:
  redis_data:
  model_cache:
